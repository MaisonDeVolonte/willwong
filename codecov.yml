#============================================
# @file codecov.yml - test coverage reporting
#============================================
# @description
# - project and patch status checks stay `informational`
# - coverage dips surface but do not block merges
# - pr comments disabled; the codecov check itself is the signal
# @see .github/workflows/ci.yml/, src/modules/stats/coverage.ts

coverage:
  status:
    project:
      default:
        informational: true
    patch:
      default:
        informational: true
comment: false
