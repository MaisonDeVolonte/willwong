name: Deploy

# CI is the sole deployer (Webflow's git auto-deploy is disabled). Building here
# means git — and therefore the real commit hash — is available, unlike Webflow's
# own build environment which has no .git. The generator bakes that SHA into the app.

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # The Webflow CLI isn't a project dep (it's global on dev machines), so
      # fetch it explicitly here. -y skips the npx install prompt.
      - run: npx -y @webflow/webflow-cli@2.1.0 cloud deploy --no-input --site-id ${{ vars.WEBFLOW_SITE_ID }}
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
