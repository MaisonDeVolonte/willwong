name: Deploy
# docs: https://developers.webflow.com/cli/command-reference
# fetch: the webflow cli @webflow/webflow-cli@2.1.0 explicitly
# flags: bypass npx install prompt, user input, site selection, and authentication

on:
  push:                                # runs on 'push'
    branches: [production]             # deploys to production branch
  workflow_dispatch:

concurrency:
  group: deploy-production             # runs only one deploy at a time
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest             # runs on ubuntu virtual machine
    steps:
      - uses: actions/checkout@v4      # clones repo into runner
        with:
          fetch-depth: 0               # full history + tags so version.mjs counts commits correctly
      - uses: actions/setup-node@v4    # installs node.js and npm caching
        with:
          node-version: 22
          cache: npm
      - run: npm ci                    # installs dependencies from package-lock.json

      - run: npx -y @webflow/webflow-cli@2.1.0 cloud deploy --no-input --site-id ${{ vars.WEBFLOW_SITE_ID }}
        env:
          WEBFLOW_API_TOKEN: ${{ secrets.WEBFLOW_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: curl -s https://willwong.me/agents > /dev/null
