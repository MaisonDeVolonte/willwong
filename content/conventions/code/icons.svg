<!--
=======================================================================
icons.svg: my 99.9% uptime, near universal vector icon rendering system
=======================================================================
- crop: artboard to the shape's edges
- position: viewbox top left corner to (0,0)
- expand: all strokes, text, and effects to solid paths
- unite: overlapping shapes to ensure fewest amount of paths
- export: paths with decimal precision matching complexity (1 to 3)
- compress: vector using 'vecta nano' (it's simply the best)
- inline: svg code directly in HTML (otherwise what's the point?)
- contain: svg with width="100%" height="100%" fill="currentColor"
- wrap: svg with parent .icon div for css control
- target: .icon with .icon-modifier to override color, size, and spacing
-->

